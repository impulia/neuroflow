name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.21.1/cargo-dist-installer.sh | sh
      - name: Build
        run: cargo dist build --target=${{ matrix.target }} --output-format=json > dist-manifest.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          # Glob for archives in both possible output dirs (target/dist/ and target/distdir/)
          path: |
            target/distdir/*.tar.gz
            target/dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Creating release for tag: $TAG"

          # Find all distributable archives
          ASSETS=$(find artifacts -type f \( -name "*.tar.gz" -o -name "*.tar.xz" -o -name "*.zip" \) | sort)

          if [ -z "$ASSETS" ]; then
            echo "::error::No release artifacts found"
            find artifacts -type f
            exit 1
          fi

          echo "Assets to upload:"
          echo "$ASSETS"

          # Create the release with auto-generated notes from commits
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $ASSETS
